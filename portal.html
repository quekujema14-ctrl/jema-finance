<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JEMA Studios – Production Portal</title>
<style>
  :root {
    --gold: #C9A84C; --gold-light: #E8C96A; --gold-dark: #A07C2D;
    --navy: #1A2744; --bg: #e4e5e9; --bg-card: #e8e9ee; --bg-input: #f0f1f5;
    --text: #1A2744; --text-muted: #6b7a8d; --white: #fff;
    --success: #27AE60; --danger: #E74C3C; --warning: #F39C12; --info: #3498DB;
    --border: rgba(26,39,68,0.08);
    --shadow-neu: 8px 8px 20px #c8cace, -8px -8px 20px #ffffff;
    --shadow-neu-sm: 4px 4px 12px #c8cace, -4px -4px 12px #ffffff;
    --shadow-neu-inset: inset 4px 4px 10px #c8cace, inset -4px -4px 10px #ffffff;
    --radius: 16px; --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .app-header { background: var(--bg); box-shadow: var(--shadow-neu); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo img { width: 38px; height: 38px; object-fit: contain; border-radius: 8px; box-shadow: 3px 3px 8px rgba(201,168,76,0.3); }
  .logo-text { font-size: 17px; font-weight: 800; color: var(--navy); }
  .logo-text span { color: var(--gold); }
  .logo-badge { font-size: 10px; font-weight: 700; background: var(--gold); color: #fff; padding: 2px 8px; border-radius: 20px; margin-left: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #aab2bd; }
  .sync-dot.connected { background: var(--success); box-shadow: 0 0 6px rgba(39,174,96,0.5); }
  .sync-label { font-size: 11px; color: var(--text-muted); }

  /* MAIN */
  .main { padding: 24px; max-width: 700px; margin: 0 auto; }

  /* CARDS */
  .card { background: var(--bg-card); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-neu); margin-bottom: 20px; }
  .card-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--navy); margin-bottom: 16px; }

  /* CONNECT STATE */
  .connect-state { text-align: center; padding: 60px 24px; }
  .connect-icon { font-size: 48px; margin-bottom: 16px; }
  .connect-title { font-size: 20px; font-weight: 800; color: var(--navy); margin-bottom: 8px; }
  .connect-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; line-height: 1.6; }
  .btn-connect { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #fff; border: none; border-radius: var(--radius-sm); padding: 14px 32px; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 4px 4px 12px rgba(201,168,76,0.4); transition: all 0.2s; }
  .btn-connect:hover { box-shadow: 6px 6px 16px rgba(201,168,76,0.5); transform: translateY(-1px); }
  .btn-connect:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* PROJECT SELECTOR */
  .project-select-wrap { position: relative; }
  .project-select-wrap select { width: 100%; padding: 14px 16px; font-size: 15px; font-weight: 600; color: var(--navy); background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); box-shadow: var(--shadow-neu-inset); appearance: none; cursor: pointer; }
  .project-select-wrap select:focus { outline: none; border-color: var(--gold); }
  .project-select-arrow { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--gold); font-size: 16px; }

  /* BUDGET CARD */
  .budget-overview { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .budget-stat { background: var(--bg-input); border-radius: var(--radius-sm); padding: 14px; text-align: center; box-shadow: var(--shadow-neu-inset); }
  .budget-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 600; margin-bottom: 6px; }
  .budget-stat-value { font-size: 18px; font-weight: 800; }
  .budget-stat-value.gold { color: var(--gold-dark); }
  .budget-stat-value.green { color: var(--success); }
  .budget-stat-value.red { color: var(--danger); }
  .budget-bar-wrap { margin-top: 4px; }
  .budget-bar-track { height: 10px; background: rgba(0,0,0,0.07); border-radius: 6px; overflow: hidden; box-shadow: inset 1px 1px 3px rgba(0,0,0,0.1); }
  .budget-bar-fill { height: 100%; border-radius: 6px; transition: width 0.5s ease; }
  .budget-bar-label { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: var(--text-muted); }
  .project-info { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .project-info strong { color: var(--navy); }

  /* TABS */
  .tab-bar { display: flex; gap: 4px; margin-bottom: 20px; background: var(--bg-input); border-radius: var(--radius-sm); padding: 4px; box-shadow: var(--shadow-neu-inset); }
  .tab-pill { flex: 1; padding: 10px; font-size: 12px; font-weight: 700; text-align: center; border: none; background: transparent; cursor: pointer; border-radius: 8px; color: var(--text-muted); transition: all 0.2s; }
  .tab-pill.active { background: var(--bg-card); color: var(--gold-dark); box-shadow: var(--shadow-neu-sm); }

  /* FORMS */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid.cols-1 { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.span-2 { grid-column: span 2; }
  label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
  input, select, textarea { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 13px; font-size: 13px; color: var(--text); box-shadow: var(--shadow-neu-inset); font-family: inherit; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--gold); }
  textarea { resize: vertical; min-height: 70px; }
  .btn-submit { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 4px 4px 12px rgba(201,168,76,0.35); margin-top: 6px; transition: all 0.2s; letter-spacing: 0.3px; }
  .btn-submit:hover { box-shadow: 6px 6px 16px rgba(201,168,76,0.5); transform: translateY(-1px); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* RECENT ENTRIES */
  .entry-list { display: flex; flex-direction: column; gap: 10px; }
  .entry-row { background: var(--bg-input); border-radius: var(--radius-sm); padding: 12px 14px; box-shadow: var(--shadow-neu-sm); display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .entry-info { flex: 1; min-width: 0; }
  .entry-main { font-size: 13px; font-weight: 600; color: var(--navy); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .entry-amount { font-size: 15px; font-weight: 800; white-space: nowrap; }
  .entry-amount.expense { color: var(--danger); }
  .entry-amount.payroll { color: var(--info); }
  .type-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .type-badge.payroll { background: rgba(52,152,219,0.12); color: var(--info); }
  .type-badge.expense { background: rgba(231,76,60,0.10); color: var(--danger); }
  .type-badge.general { background: rgba(243,156,18,0.12); color: var(--warning); }
  .empty-state { text-align: center; padding: 28px; color: var(--text-muted); font-size: 13px; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--navy); color: #fff; padding: 12px 24px; border-radius: 30px; font-size: 13px; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,0.2); transition: transform 0.3s ease, opacity 0.3s; opacity: 0; z-index: 999; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* HIDDEN */
  .hidden { display: none !important; }

  @media (max-width: 768px) {
    /* Layout */
    .main { padding: 14px; }

    /* Header — hide sync label text on small phones, dot is enough */
    .sync-label { display: none; }
    .logo-text { font-size: 15px; }
    .logo-badge { font-size: 9px; padding: 2px 6px; }
    .app-header { padding: 0 14px; }

    /* Budget stats → single column so values never truncate */
    .budget-overview { grid-template-columns: 1fr; gap: 8px; }
    .budget-stat { display: flex; justify-content: space-between; align-items: center; text-align: left; padding: 12px 14px; }
    .budget-stat-label { margin-bottom: 0; margin-right: 12px; flex-shrink: 0; }
    .budget-stat-value { font-size: 20px; }

    /* Forms */
    .form-grid { grid-template-columns: 1fr; }
    .form-group.span-2 { grid-column: span 1; }

    /* Inputs — large touch targets */
    input, select, textarea {
      font-size: 16px !important; /* prevents iOS zoom on focus */
      min-height: 44px;
    }

    /* Tab bar */
    .tab-pill { font-size: 11px; padding: 10px 6px; }

    /* Connect button — full width */
    .btn-connect { width: 100%; }

    /* Cards */
    .card { padding: 18px 14px; }

    /* Entry rows */
    .entry-row { flex-wrap: wrap; }

    /* Toast — above browser nav bar */
    .toast { bottom: 80px; }
  }
</style>
</head>

<main class="main">

  <!-- ── CONNECT STATE ── -->
  <div id="state-connect" class="card connect-state">
    <div class="connect-icon">⏳</div>
    <div class="connect-title">Loading portal…</div>
    <div class="connect-sub">Connecting to JEMA Finance Operations Hub.</div>
  </div>

  <!-- ── PROJECT SELECTOR ── -->
  <div id="state-select" class="card hidden">
    <div class="card-title">Select Your Project</div>
    <div class="project-select-wrap">
      <select id="project-select" onchange="onProjectSelect()">
        <option value="">— Choose a project —</option>
      </select>
      <span class="project-select-arrow">▾</span>
    </div>
  </div>

  <!-- ── BUDGET OVERVIEW ── -->
  <div id="state-budget" class="card hidden">
    <div class="card-title">Budget Overview</div>
    <div class="project-info" id="project-info"></div>
    <div class="budget-overview">
      <div class="budget-stat">
        <div class="budget-stat-label">Budget Cap</div>
        <div class="budget-stat-value gold" id="stat-cap">—</div>
      </div>
      <div class="budget-stat">
        <div class="budget-stat-label">Spent</div>
        <div class="budget-stat-value red" id="stat-spent">—</div>
      </div>
      <div class="budget-stat">
        <div class="budget-stat-label">Remaining</div>
        <div class="budget-stat-value green" id="stat-remaining">—</div>
      </div>
    </div>
    <div class="budget-bar-wrap">
      <div class="budget-bar-track">

    <!-- PAYROLL FORM -->
    <div id="form-payroll">

    <!-- PROJECT EXPENSE FORM -->
    <div id="form-project" class="hidden">
      <div class="form-grid">
        <div class="form-group span-2">
          <label>Category</label>
          <select id="proj-category">
            <option value="">Select category</option>
            <option>Travel – Flights</option><option>Travel – Accommodation</option><option>Travel – Uber/Taxi</option><option>Travel – Other</option>
            <option>Meals – Crew</option>
            <option>Overheads – Videographer</option><option>Overheads – Photographer</option><option>Overheads – Assistant</option>
            <option>Equipment Rental – Camera</option><option>Equipment Rental – Lens</option><option>Equipment Rental – Lighting</option><option>Equipment Rental – Other</option>
            <option>Equipment Purchase — Camera</option><option>Equipment Purchase — Lens</option><option>Equipment Purchase — Audio</option><option>Equipment Purchase — Lighting</option><option>Equipment Purchase — Computer</option><option>Equipment Purchase — Accessories</option>
            <option>Studio Rental – Local</option><option>Studio Rental – International</option>
            <option>Shipping – Local</option><option>Shipping – International</option><option>Courier/Dispatch</option>
            <option>Client Gifts</option>

    <!-- GENERAL EXPENSE FORM -->

            <option>Office Supplies – General</option>

            <option>Marketing – Ads (Studio Branding)</option><option>Marketing – Ads (Meta)</option>
            <option>Legal</option><option>Accounting/Tax</option><option>Consulting</option><option>Other Professional</option>
            <option>Workshops/Conferences</option><option>Online Courses</option><option>Books/Materials</option>
            <option>Cash Transfer to KW</option><option>Cash Transfer to IB</option><option>Cash Transfer to OT</option><option>Cash Deposit</option>
            <option>Bill Paid on Behalf of Studio</option>
            <option>Vendor Gifts</option><option>Other Gifts</option>
            <option>Miscellaneous – Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Amount ($)</label>
          <input type="number" id="gen-amount" placeholder="0.00" inputmode="decimal">
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="gen-date">
        </div>
        <div class="form-group">
          <label>Payment Method</label>
          <select id="gen-method">
            <option>Cash</option>
            <option>Business Credit Card</option>
            <option>Visa Debit</option>
            <option>KW – CIBC</option>
            <option>Zelle TD (OWACHI)</option>
            <option>Zelle CHASE (IB)</option>
            <option>PayPal</option>
            <option>Wise</option>
            <option>Stripe</option>
          </select>
        </div>

            <option value="">Not Uploaded</option>

  <!-- ── RECENT ENTRIES ── -->
  <div id="state-recent" class="card hidden">
    <div class="card-title">Recent Entries — <span id="recent-project-name" style="color:var(--gold-dark)"></span></div>
    <div class="entry-list" id="entry-list"></div>

</main>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
// After deploying portalProxy.gs as a Web App, paste the URL below:
const PROXY_URL = 'YOUR_WEB_APP_URL_HERE';
const API_KEY   = 'jema-portal-2026';

let allJobs = [], projectExpenses = [], projectPayroll = [];
let selectedJob = null;
let LISTS = {};
const fmt   = n => '$' + Number(n||0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
const today = () => new Date().toISOString().slice(0,10);

// ── SET DEFAULTS ─────────────────────────────────────────────────────────────
document.getElementById('pay-date').value  = today();
document.getElementById('proj-date').value = today();
document.getElementById('gen-date').value  = today();

// ── PROXY HELPERS ─────────────────────────────────────────────────────────────
async function proxyGet(action, extra) {
  const params = new URLSearchParams({ key: API_KEY, action, ...(extra||{}) });
  const r = await fetch(PROXY_URL + '?' + params.toString());
  if (!r.ok) throw new Error('Request failed: ' + r.status);
  const data = await r.json();
  if (data.error) throw new Error(data.error);
  return data;
}
async function proxyPost(action, payload) {
  const r = await fetch(PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ key: API_KEY, action, data: payload })
  });
  if (!r.ok) throw new Error('Request failed: ' + r.status);
  const data = await r.json();
  if (data.error) throw new Error(data.error);
  return data;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function initPortal() {
  if (!PROXY_URL || PROXY_URL === 'YOUR_WEB_APP_URL_HERE') {
    showToast('⚠️ Proxy URL not configured — see setup instructions');
    return;
  }
  document.getElementById('sync-dot').classList.add('connected');
  document.getElementById('sync-label').textContent = 'Live';
  document.getElementById('state-connect').classList.add('hidden');
  await Promise.all([ loadLists(), loadTeamMembers(), loadJobs() ]);
}

// ── LOAD LISTS (dynamic dropdowns) ───────────────────────────────────────────
async function loadLists() {
  try {
    const data = await proxyGet('getLists');
    LISTS = data.lists || {};
    if (!Object.keys(LISTS).length) return;

    // Helper to populate a <select> from a LISTS key, keeping placeholder
    const fill = (id, key) => {
      const sel = document.getElementById(id);
      if (!sel || !LISTS[key]) return;
      const current = sel.value;
      // Remove all except first placeholder option
      while (sel.options.length > 1) sel.remove(1);
      LISTS[key].forEach(v => {
        const o = document.createElement('option');
        o.value = v; o.textContent = v;
        sel.appendChild(o);
      });
      if (current) sel.value = current;
    };

    // Roles
    fill('pay-role', 'ROLES');

    // Payment methods — all three forms
    ['pay-method','proj-method','gen-method'].forEach(id => fill(id, 'PAYMENT_METHODS'));

    // Project expense categories
    const projCatIds = ['proj-category'];
    projCatIds.forEach(id => {
      const sel = document.getElementById(id);
      if (!sel || !LISTS['CATEGORIES']) return;
      while (sel.options.length > 1) sel.remove(1);
      // Project-relevant categories (exclude overhead/subscription/admin)
      const exclude = ['Subscriptions','Office Supplies','Bank Fees','Currency Conversion','Platform Fees','Other Fees','Legal','Accounting','Consulting','Other Professional','Workshops','Online Courses','Books','Cash Transfer','Bill Paid','Vendor Gifts','Other Gifts'];
      LISTS['CATEGORIES']
        .filter(c => !exclude.some(ex => c.startsWith(ex)))
        .forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; sel.appendChild(o); });
    });

    // General expense categories
    const genSel = document.getElementById('gen-category');
    if (genSel && LISTS['CATEGORIES']) {
      while (genSel.options.length > 1) genSel.remove(1);
      // General/overhead only — exclude project-specific ones
      const exclude = ['Travel –','Meals –','Equipment Rental','Studio Rental','Client Gifts','Shipping'];
      LISTS['CATEGORIES']
        .filter(c => !exclude.some(ex => c.startsWith(ex)))
        .forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; genSel.appendChild(o); });
    }

  } catch(e) { console.warn('Could not load lists:', e.message); }
}

// ── LOAD TEAM MEMBERS ────────────────────────────────────────────────────────
async function loadTeamMembers() {
  try {
    const data = await proxyGet('getTeam');
    const members = data.members || [];
    const sel = document.getElementById('pay-member');
    sel.innerHTML = '<option value="">Select member</option>';
    members.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name; opt.textContent = name;
      sel.appendChild(opt);
    });
  } catch(e) { console.warn('Could not load team members:', e.message); }
}

// ── LOAD JOBS ─────────────────────────────────────────────────────────────────
async function loadJobs() {
  try {
    const data = await proxyGet('getJobs');
    allJobs = data.jobs || [];
    const sel = document.getElementById('project-select');
    allJobs.forEach((j,i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${j.client} · ${j.month} ${j.year} · ${j.location}`;
      sel.appendChild(opt);
    });
    document.getElementById('state-select').classList.remove('hidden');
  } catch(e) { showToast('Error loading jobs: ' + e.message); }
}

// ── PROJECT SELECTED ──────────────────────────────────────────────────────────
async function onProjectSelect() {
  const idx = document.getElementById('project-select').value;
  if (idx === '') {
    document.getElementById('state-budget').classList.add('hidden');
    document.getElementById('state-log').classList.add('hidden');
    document.getElementById('state-recent').classList.add('hidden');
    return;
  }
  selectedJob = allJobs[parseInt(idx)];
  await loadProjectData();
}

async function loadProjectData() {
  if (!selectedJob) return;
  try {
    const capPct = selectedJob.budget_cap > 0 ? selectedJob.budget_cap : 35;
    const capAmt = selectedJob.total * (capPct / 100);

    // Load expenses + payroll via proxy (already filtered by client)
    const data = await proxyGet('getProjectData', { client: selectedJob.client });
    projectExpenses = data.expenses || [];
    projectPayroll  = data.payroll  || [];
    const totalExp = projectExpenses.reduce((s,r) => s + (r.amount||0), 0);
    const totalPay = projectPayroll.reduce((s,r)  => s + (r.amount||0), 0);

    const totalSpent = totalExp + totalPay;
    const remaining  = capAmt - totalSpent;
    const pct = capAmt > 0 ? Math.min((totalSpent / capAmt) * 100, 100) : 0;

    // Update budget display
    document.getElementById('project-info').innerHTML =
      `<strong>${selectedJob.client}</strong> &nbsp;·&nbsp; ${selectedJob.day} ${selectedJob.month} ${selectedJob.year} &nbsp;·&nbsp; ${selectedJob.location}<br>
       <span style="margin-top:4px;display:block">${selectedJob.pkg}</span>`;

    document.getElementById('stat-cap').textContent       = fmt(capAmt);
    document.getElementById('stat-spent').textContent     = fmt(totalSpent);
    document.getElementById('stat-remaining').textContent = fmt(remaining > 0 ? remaining : 0);
    document.getElementById('stat-remaining').className   = 'budget-stat-value ' + (remaining <= 0 ? 'red' : remaining < capAmt * 0.1 ? 'gold' : 'green');

    const bar = document.getElementById('budget-bar');
    bar.style.width = pct + '%';
    bar.style.background = pct >= 100 ? 'var(--danger)' : pct >= 80 ? 'var(--warning)' : 'var(--success)';
    document.getElementById('bar-pct-label').textContent = pct.toFixed(1) + '% used';
    document.getElementById('bar-cap-label').textContent = capPct + '% budget cap of contract';

    document.getElementById('state-budget').classList.remove('hidden');
    document.getElementById('state-log').classList.remove('hidden');

    // Render recent entries
    renderRecent(totalExp, totalPay);

  } catch(e) { showToast('Error loading project data: ' + e.message); }
}

function renderRecent() {
  const listEl = document.getElementById('entry-list');
  const combined = [
    ...projectPayroll.map(r  => ({ type:'payroll',  label: r.member||'Team Member', sub: r.role||'',    date: String(r.date||''), amount: r.amount||0 })),
    ...projectExpenses.map(r => ({ type:'expense',   label: r.category||'Expense',   sub: r.desc||'',    date: String(r.date||''), amount: r.amount||0 }))
  ].sort((a,b) => b.date.localeCompare(a.date)).slice(0, 12);

  document.getElementById('recent-project-name').textContent = selectedJob.client;
  document.getElementById('state-recent').classList.remove('hidden');

  if (combined.length === 0) {
    listEl.innerHTML = '<div class="empty-state">No entries logged yet for this project.</div>';
    return;
  }
  listEl.innerHTML = combined.map(e => `
    <div class="entry-row">
      <div class="entry-info">
        <div class="entry-main">${e.label}</div>
        <div class="entry-sub">${e.date}${e.sub ? ' · ' + e.sub : ''}</div>
      </div>
      <span class="type-badge ${e.type}">${e.type === 'payroll' ? 'Payroll' : e.type === 'general' ? 'General' : 'Project'}</span>
      <div class="entry-amount ${e.type === 'payroll' ? 'payroll' : 'expense'}">${fmt(e.amount)}</div>
    </div>`).join('');
}

// ── TAB SWITCHING ─────────────────────────────────────────────────────────────
function switchTab(tab, btn) {
  ['payroll','project','general'].forEach(t => {
    document.getElementById('form-' + t).classList.add('hidden');
  });
  document.querySelectorAll('.tab-pill').forEach(b => b.classList.remove('active'));
  document.getElementById('form-' + tab).classList.remove('hidden');
  btn.classList.add('active');
}

// ── SUBMIT PAYROLL ────────────────────────────────────────────────────────────
async function submitPayroll() {
  if (!selectedJob) return;
  const member = document.getElementById('pay-member').value;
  const role   = document.getElementById('pay-role').value;
  const amount = parseFloat(document.getElementById('pay-amount').value);
  const method = document.getElementById('pay-method').value;
  const date   = document.getElementById('pay-date').value;
  const notes  = document.getElementById('pay-notes').value;
  if (!member || !amount || !date) { showToast('Please fill in member, amount and date'); return; }
  const btn = document.querySelector('#form-payroll .btn-submit');
  btn.disabled = true; btn.textContent = '⏳ Saving…';
  try {
    await proxyPost('appendPayroll', { date, project: selectedJob.client, member, role, method, amount, notes });
    showToast('✅ Payroll entry saved!');
    document.getElementById('pay-amount').value = '';
    document.getElementById('pay-notes').value  = '';
    await loadProjectData();
  } catch(e) { showToast('Error: ' + e.message); }
  btn.disabled = false; btn.textContent = '✓ Log Payroll Entry';
}

// ── SUBMIT PROJECT EXPENSE ────────────────────────────────────────────────────
async function submitProjectExpense() {
  if (!selectedJob) return;
  const category = document.getElementById('proj-category').value;
  const amount   = parseFloat(document.getElementById('proj-amount').value);
  const date     = document.getElementById('proj-date').value;
  const method   = document.getElementById('proj-method').value;
  const receipt  = document.getElementById('proj-receipt').value;
  const desc     = document.getElementById('proj-desc').value;
  if (!category || !amount || !date) { showToast('Please fill in category, amount and date'); return; }
  const btn = document.querySelector('#form-project .btn-submit');
  btn.disabled = true; btn.textContent = '⏳ Saving…';
  try {
    await proxyPost('appendExpense', { date, category, amount, method, project: selectedJob.client, desc, receipt });
    showToast('✅ Project expense saved!');
    document.getElementById('proj-amount').value = '';
    document.getElementById('proj-desc').value   = '';
    await loadProjectData();
  } catch(e) { showToast('Error: ' + e.message); }
  btn.disabled = false; btn.textContent = '✓ Log Project Expense';
}

// ── SUBMIT GENERAL EXPENSE ────────────────────────────────────────────────────
async function submitGeneralExpense() {
  const category = document.getElementById('gen-category').value;
  const amount   = parseFloat(document.getElementById('gen-amount').value);
  const date     = document.getElementById('gen-date').value;
  const method   = document.getElementById('gen-method').value;
  const receipt  = document.getElementById('gen-receipt').value;
  const desc     = document.getElementById('gen-desc').value;
  if (!category || !amount || !date) { showToast('Please fill in category, amount and date'); return; }
  const btn = document.querySelector('#form-general .btn-submit');
  btn.disabled = true; btn.textContent = '⏳ Saving…';
  try {
    await proxyPost('appendExpense', { date, category, amount, method, project: '', desc, receipt });
    showToast('✅ General expense saved!');
    document.getElementById('gen-amount').value = '';
    document.getElementById('gen-desc').value   = '';
  } catch(e) { showToast('Error: ' + e.message); }
  btn.disabled = false; btn.textContent = '✓ Log General Expense';
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
initPortal();
</script>
